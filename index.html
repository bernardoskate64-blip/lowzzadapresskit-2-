<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOWZZADA | Official Artist Page</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary: #00ffcc; 
            --bg: #000000;
            --surface: #0a0a0a;
            --text: #ffffff;
            --accent: #0066ff;
            --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Custom Cursor (Opcional, dá um ar Pro) --- */
        body { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10"><circle cx="5" cy="5" r="5" fill="%2300ffcc"/></svg>'), auto; }

        /* --- Nav de Luxo --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 30px 6%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            backdrop-filter: blur(15px);
        }
        .logo { font-family: 'Syncopate', sans-serif; font-weight: 700; letter-spacing: 8px; font-size: 1.1rem; color: #fff; text-decoration: none; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 0.65rem; letter-spacing: 3px; margin-left: 30px; text-transform: uppercase; opacity: 0.6; transition: var(--transition); }
        .nav-links a:hover { opacity: 1; color: var(--primary); }

        /* --- Hero High-Impact --- */
        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; overflow: hidden; text-align: center;
        }
        .hero-video-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.45; z-index: -1; filter: contrast(110%) brightness(80%); }
        .hero h1 { font-family: 'Syncopate', sans-serif; font-size: clamp(3rem, 15vw, 10rem); line-height: 0.8; letter-spacing: -5px; margin-bottom: 20px; text-transform: uppercase; }
        .hero p { letter-spacing: 15px; font-weight: 300; color: var(--primary); font-size: 0.7rem; text-transform: uppercase; margin-top: 10px; }

        /* --- Grid de Fotos: O Ajuste Perfeito --- */
        .section-label { padding: 100px 6% 20px; font-family: 'Syncopate'; font-size: 0.8rem; letter-spacing: 5px; color: #333; }
        
        .gallery-wrap {
            padding: 0 6% 100px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 25px;
        }

        .photo-card {
            position: relative;
            height: 550px; /* Altura fixa para manter o grid simétrico */
            overflow: hidden;
            background: #080808;
            border-radius: 2px;
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* ANÁLISE E CORREÇÃO DE ENQUADRAMENTO */
        /* Ajuste para fotos onde o rosto/corpo está muito no topo ou fundo */
        .img-top { object-position: center 15%; } /* Sobe a imagem */
        .img-center { object-position: center center; } /* Foco central */
        .img-bottom { object-position: center 85%; } /* Desce a imagem */

        .photo-card:hover img { transform: scale(1.1); }
        .photo-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.4), transparent); pointer-events: none; }

        /* --- Vídeos: Elegância Minimalista --- */
        .video-section { padding: 100px 6%; background: #050505; }
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .video-box { border-radius: 8px; overflow: hidden; background: #000; border: 1px solid rgba(255,255,255,0.05); }
        video { width: 100%; height: auto; display: block; }

        /* --- Gigs Archive: Organizado --- */
        .archive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            padding: 0 6% 100px;
        }
        .archive-item {
            height: 300px;
            overflow: hidden;
            border-radius: 4px;
            filter: grayscale(100%);
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .archive-item:hover { filter: grayscale(0%); transform: translateY(-5px); border-color: var(--primary); }
        .archive-item img { width: 100%; height: 100%; object-fit: cover; }

        /* --- Connect / Player --- */
        .connect { text-align: center; padding: 100px 6%; border-top: 1px solid #111; }
        iframe { border-radius: 8px; filter: invert(0); margin-bottom: 50px; }
        .social-row { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
        .social-link { font-family: 'Syncopate'; font-size: 0.7rem; color: #fff; text-decoration: none; letter-spacing: 3px; transition: 0.3s; }
        .social-link:hover { color: var(--primary); text-shadow: 0 0 15px rgba(0,255,204,0.5); }

        /* --- Footer --- */
        footer { padding: 50px 6%; text-align: center; font-size: 0.6rem; color: #444; letter-spacing: 2px; }

        @media (max-width: 768px) {
            nav { padding: 20px; }
            .nav-links { display: none; }
            .gallery-wrap, .video-grid, .archive-grid { grid-template-columns: 1fr; }
            .photo-card { height: 450px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">LOWZZADA</a>
        <div class="nav-links">
            <a href="#gallery">Gallery</a>
            <a href="#video">Sessions</a>
            <a href="#archive">Archive</a>
            <a href="#connect">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <video class="hero-video-bg" autoplay muted loop playsinline>
            <source src="IMG_7476.MOV" type="video/mp4">
        </video>
        <div data-aos="fade-down" data-aos-duration="1200">
            <h1>LOWZZADA</h1>
            <p>The Rio Tech House Culture</p>
        </div>
    </section>

    <div id="gallery" class="section-label">LIFESTYLE / PRESS</div>
    <section class="gallery-wrap">
        <div class="photo-card" data-aos="reveal-up">
            <img src="6f72290a-3bba-4a50-8ace-632aadd9bf35.jpg" class="img-center" alt="Artist">
        </div>
        <div class="photo-card" data-aos="reveal-up" data-aos-delay="200">
            <img src="WhatsApp Image 2026-04-30 at 11.53.49.jpeg" class="img-top" alt="Live Session">
        </div>
        <div class="photo-card" data-aos="reveal-up" data-aos-delay="400">
            <img src="5e93562e-b33f-4952-9ed3-b335f07399f4.jpg" class="img-top" alt="Studio Press">
        </div>
    </section>

    <div id="video" class="section-label">LIVE SESSIONS</div>
    <section class="video-section">
        <div class="video-grid">
            <div class="video-box" data-aos="zoom-in-up">
                <video controls poster="6f72290a-3bba-4a50-8ace-632aadd9bf35.jpg">
                    <source src="IMG_0419.MOV" type="video/mp4">
                </video>
            </div>
            <div class="video-box" data-aos="zoom-in-up" data-aos-delay="200">
                <video controls>
                    <source src="IMG_3768.MOV" type="video/mp4">
                </video>
            </div>
        </div>
    </section>

    <div id="archive" class="section-label">GIG ARCHIVE</div>
    <section class="archive-grid">
        <div class="archive-item" data-aos="fade-up">
            <img src="caa803fc-0055-453b-ab57-4a9daac49641.jpg" alt="Gig recap">
        </div>
        <div class="archive-item" data-aos="fade-up" data-aos-delay="100">
            <img src="13857a2a-44db-44c2-a91e-3b56ae20293d.jpg" alt="Gig recap">
        </div>
        <div class="archive-item" data-aos="fade-up" data-aos-delay="200">
            <img src="image_d478f8.jpg" alt="Nightlife">
        </div>
        <div class="archive-item" data-aos="fade-up" data-aos-delay="300">
            <img src="image_d4747b.jpg" alt="DJ Set">
        </div>
    </section>

    <section id="connect" class="connect">
        <div data-aos="fade-up">
            <iframe width="100%" height="180" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/users/693807927&color=%2300ffcc&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false"></iframe>
        </div>
        
        <div class="social-row">
            <a href="https://www.instagram.com/lowzzada_dj" target="_blank" class="social-link">INSTAGRAM</a>
            <a href="https://soundcloud.com/diogo-diogo-693807927" target="_blank" class="social-link">SOUNDCLOUD</a>
            <a href="https://www.youtube.com/@lowzzada" target="_blank" class="social-link">YOUTUBE</a>
        </div>
    </section>

    <footer>
        LOWZZADA © 2026 | ALL RIGHTS RESERVED
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Inicialização de animações Pro
        AOS.init({
            duration: 1000,
            once: false,
            easing: 'ease-out-quart'
        });

        // Efeito Parallax suave no Hero
        window.addEventListener('scroll', function() {
            const video = document.querySelector('.hero-video-bg');
            let scroll = window.pageYOffset;
            video.style.transform = 'translateY(' + scroll * 0.4 + 'px) scale(1.1)';
        });
    </script>
</body>
</html>
