<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>LOWZZADA</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    width: 100%;
    overflow-x: hidden;
    background: #0a0a0a;
    color: #fff;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    width: 100%;
    max-width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* HERO VIDEO — above the title, centered */
  .hero-video {
    width: 100%;
    height: 60vh;
    max-height: 600px;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #111;
    position: relative;
  }

  .hero-video video,
  .hero-video img {
    object-fit: cover;
    object-position: center top;
    width: 100%;
    height: 100%;
    display: block;
  }

  .hero-video::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 60%, rgba(10,10,10,0.9) 100%);
    pointer-events: none;
  }

  /* MAIN TITLE — LOWZZADA */
  .title-wrap {
    width: 100%;
    padding: 40px 20px 20px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .lowzzada {
    font-size: clamp(2.5rem, 12vw, 8rem);
    font-weight: 900;
    letter-spacing: 0.05em;
    text-align: center;
    background: linear-gradient(90deg, #fff 0%, #bbb 50%, #fff 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    cursor: pointer;
    user-select: none;
    display: inline-block;
    transform: scale(1) rotate(0deg);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                background-position 0.6s ease,
                letter-spacing 0.4s ease;
    will-change: transform;
    line-height: 1.1;
    word-break: break-word;
    max-width: 100%;
  }

  /* Desktop hover */
  @media (hover: hover) and (pointer: fine) {
    .lowzzada:hover {
      transform: scale(1.08) rotate(-1deg);
      background-position: 100% 0;
      letter-spacing: 0.1em;
    }
  }

  /* Mobile touch state (set by JS) */
  .lowzzada.touch-active {
    transform: scale(1.08) rotate(-1deg);
    background-position: 100% 0;
    letter-spacing: 0.08em;
  }

  /* Content area */
  .content {
    width: 100%;
    max-width: 1100px;
    padding: 30px 20px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
  }

  .card {
    background: #161616;
    border: 1px solid #222;
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.3s ease, border-color 0.3s ease;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: #444;
  }

  .card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    object-position: center;
    display: block;
    background: #222;
  }

  .card-body {
    padding: 16px;
  }

  .card-body h3 {
    font-size: 1rem;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .card-body p {
    font-size: 0.85rem;
    color: #888;
    line-height: 1.5;
  }

  .tagline {
    text-align: center;
    color: #888;
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    padding: 0 20px 30px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    max-width: 100%;
    word-wrap: break-word;
  }

  footer {
    width: 100%;
    padding: 30px 20px;
    text-align: center;
    border-top: 1px solid #222;
    font-size: 0.75rem;
    color: #555;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Mobile-specific */
  @media (max-width: 768px) {
    .hero-video {
      height: 45vh;
      min-height: 280px;
    }

    .title-wrap {
      padding: 24px 16px 12px;
    }

    .content {
      padding: 20px 16px 40px;
      gap: 14px;
      grid-template-columns: 1fr;
    }

    .card img {
      height: 180px;
    }
  }

  @media (max-width: 380px) {
    .hero-video {
      height: 38vh;
    }
    .lowzzada {
      letter-spacing: 0.02em;
    }
  }
</style>
</head>
<body>

  <div class="container">

    <!-- 1. HERO VIDEO — above the title -->
    <section class="hero-video">
      <video
        src="video.mp4"
        autoplay
        muted
        loop
        playsinline
        preload="metadata"
        poster="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=1600&q=80"
      >
        <img
          src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=1600&q=80"
          alt="Hero"
        />
      </video>
    </section>

    <!-- 2. MAIN TITLE — LOWZZADA (no video behavior) -->
    <div class="title-wrap">
      <h1 class="lowzzada" id="lowzzada">LOWZZADA</h1>
    </div>

    <p class="tagline">Streetwear · Drop 01 · 2026</p>

    <!-- Content grid -->
    <section class="content">
      <article class="card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600&q=80" alt="Product 1" />
        <div class="card-body">
          <h3>Air Box Tee</h3>
          <p>Heavyweight cotton, oversized fit.</p>
        </div>
      </article>

      <article class="card">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600&q=80" alt="Product 2" />
        <div class="card-body">
          <h3>Core Hoodie</h3>
          <p>Brushed fleece interior, boxy silhouette.</p>
        </div>
      </article>

      <article class="card">
        <img src="https://images.unsplash.com/photo-1556905055-8f358a7a47b2?w=600&q=80" alt="Product 3" />
        <div class="card-body">
          <h3>Cargo Pant</h3>
          <p>Ripstop nylon, utility pockets.</p>
        </div>
      </article>
    </section>

    <footer>© 2026 LOWZZADA — All rights reserved</footer>

  </div>

<script>
  // 2. LOWZZADA — mobile touch interaction with transform + transition
  (function () {
    const el = document.getElementById('lowzzada');
    if (!el) return;

    let touchTimer = null;

    const activate = () => {
      el.classList.add('touch-active');
      clearTimeout(touchTimer);
      touchTimer = setTimeout(() => {
        el.classList.remove('touch-active');
      }, 600);
    };

    el.addEventListener('touchstart', function (e) {
      activate();
    }, { passive: true });

    el.addEventListener('touchend', function () {
      // let timer release the class for a smoother bounce
    }, { passive: true });
  })();

  // Hero video — graceful fallback if placeholder src fails to load
  (function () {
    const video = document.querySelector('.hero-video video');
    if (!video) return;
    video.addEventListener('error', function () {
      const fallback = document.createElement('img');
      fallback.src = video.getAttribute('poster') || '';
      fallback.alt = 'Hero';
      video.replaceWith(fallback);
    }, true);
  })();
</script>

</body>
</html>
